      var key2='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtnc21haW1sZXFxcG9yb2d6YXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzgxMDQsImV4cCI6MjA5MzA1NDEwNH0.UWoFhZVqWNodOcjZfuJb_9HGm8HC13Ta29Xi_KTWCjo';
      fetch('https://kgsmaimleqqporogzayb.supabase.co/rest/v1/users?ativo=eq.true&select=id,name,role,ativo,turma_id',{headers:{'apikey':key2,'Authorization':'Bearer '+key2}})
        .then(function(r){return r.json();})
        .then(function(data){
          clearTimeout(timer);
          if(data&&data.length){setUsers(data.map(function(u){return Object.assign({pin:'',ativo:true},u);}));}
        }).catch(function(e){console.error('users load error',e);});
    }
  },[]);

  var sommelier=users.find(function(u){return u.role==='sommelier';})||{id:'u1',name:'Epicure Sommelier',role:'sommelier',pin:'1234'};
  var avs=users.filter(function(u){return u.role==='avaliador'&&u.ativo!==false;});

  function tryLogin(){
    if(!sl){setEr('Selecione um usuário.');return;}
    setLd(true);
    if(USE_CLOUD){
      var key='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtnc21haW1sZXFxcG9yb2d6YXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzgxMDQsImV4cCI6MjA5MzA1NDEwNH0.UWoFhZVqWNodOcjZfuJb_9HGm8HC13Ta29Xi_KTWCjo';
      var hdrs={'apikey':key,'Authorization':'Bearer '+key,'Content-Type':'application/json'};
      fetch('https://kgsmaimleqqporogzayb.supabase.co/rest/v1/users?id=eq.'+encodeURIComponent(sl)+'&pin=eq.'+encodeURIComponent(pn)+'&ativo=eq.true&select=*',{headers:hdrs})
        .then(function(r){return r.json();})
        .then(function(data){
          if(!data||!data[0]){setLd(false);setEr('PIN incorreto.');return;}
          var dbUser=Object.assign({ativo:true},data[0]);
          DB.loadAll(dbUser.id).then(function(){
            setLd(false);
            p.onLogin(dbUser);
          });
        }).catch(function(e){setLd(false);setEr('Erro de conexão. Tente novamente.');});
    } else {
      var u=_DEMO_STORE.users.find(function(x){return x.id===sl&&x.pin===pn;});
      if(u){upd(function(){return Object.assign({},_DEMO_STORE);});}
      setLd(false);
      if(u)p.onLogin(u);else setEr('PIN incorreto.');
    }
  }

  // Users loaded from _DEMO_STORE immediately, Supabase updates in background

  return h('div',{style:{height:'100vh',height:'100dvh',background:D,overflowY:'auto',WebkitOverflowScrolling:'touch'}},
    h('div',{style:{padding:'40px 24px',display:'flex',flexDirection:'column',alignItems:'center'}},[
      h('div',{style:{textAlign:'center',marginBottom:36}},[
        h('div',{style:{fontSize:38,color:G,marginBottom:6}},'⬡'),
        h('div',{style:{fontSize:28,color:G,letterSpacing:3,marginBottom:4}},'Epicure'),
        h('div',{style:{fontSize:11,letterSpacing:4,color:MU,textTransform:'uppercase'}},'Cigar Sommelier'),
        USE_CLOUD&&h('div',{style:{marginTop:8,fontSize:11,color:GRL}},'◉ Sincronização em nuvem ativa')
      ]),
      h('div',{style:{width:'100%',maxWidth:400}},[
        h('div',{style:{fontSize:10,color:G,letterSpacing:2,textTransform:'uppercase',marginBottom:8}},'✦ Sommelier Mestre'),
        h('div',{className:'ca',style:{cursor:'pointer',borderColor:sl===sommelier.id?G:W,display:'flex',alignItems:'center',gap:12},onClick:function(){setSl(sommelier.id);setPn('');setEr('');}},[
          h(Ava,{name:sommelier.name,size:44}),
          h('div',null,[h('div',{style:{color:GL,fontSize:15}},sommelier.name),h('div',{className:'mu',style:{fontSize:11}},'Acesso completo')])
        ]),
        avs.length>0&&h('div',{style:{fontSize:10,color:MU,letterSpacing:2,textTransform:'uppercase',marginBottom:8,marginTop:8}},'Avaliadores'),
        avs.map(function(u){return h('div',{key:u.id,className:'ca',style:{cursor:'pointer',borderColor:sl===u.id?G:W,display:'flex',alignItems:'center',gap:12},onClick:function(){setSl(u.id);setPn('');setEr('');}},[
          h(Ava,{name:u.name,size:38}),
          h('div',null,[h('div',{style:{color:CR,fontSize:14}},u.name),h('div',{className:'mu',style:{fontSize:11}},'Avaliador')])
        ]);})
      ]),
      sl&&h('div',{style:{width:'100%',maxWidth:400,marginTop:16}},[
        h('label',{className:'lbl'},'PIN de acesso'),
        h('input',{className:'inp',type:'password',maxLength:4,value:pn,
          onChange:function(e){setPn(e.target.value);setEr('');},
          onKeyDown:function(e){if(e.key==='Enter')tryLogin();},
          placeholder:'\u2022\u2022\u2022\u2022',
          style:{fontSize:26,letterSpacing:10,textAlign:'center'},
          inputMode:'numeric',autoFocus:true}),
        er&&h('div',{style:{color:RD,fontSize:13,textAlign:'center',marginBottom:8}},er),
        h('button',{className:'btn',style:{opacity:ldv?0.6:1},onClick:tryLogin},ldv?'Verificando...':'Entrar')
      ])
    ])
  );
}

function App(){var user=React.useState(null),u=user[0],setU=user[1];if(!u)return h(LoginScreen,{onLogin:setU});if(u.role==='sommelier')return h(AppSommelier,{user:u,onLogout:function(){setU(null);}});return h(AppAvaliador,{user:u,onLogout:function(){setU(null);}});}
try {
  ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
} catch(e) {
  document.getElementById('root').innerHTML = 
    '<div style="padding:20px;background:#1A1612;min-height:100vh;font-family:monospace">' +
    '<div style="color:#E8C547;font-size:18px;margin-bottom:12px">⬡ Erro ao montar app</div>' +
    '<div style="color:#E74C3C;font-size:14px;word-break:break-all">' + e.message + '</div>' +
    '<div style="color:#8A7A65;font-size:12px;margin-top:8px">' + (e.stack||'').slice(0,300) + '</div>' +
    '</div>';
}
</script>
</body>
